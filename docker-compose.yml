services:
  dst_base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: dst-base:latest
    profiles:
      - build

  dst_caves:
    container_name: dst_caves
    build: .
    ports:
      - "10998:10998/udp"
    networks:
      - dst_cluster
    links:
      - dst_master
    volumes:
      - ./DSTClusterConfig:/home/dst/.klei/DoNotStarveTogether/DSTWhalesCluster
    environment:
      - SHARD_NAME=Caves

  dst_master:
    container_name: dst_master
    build: .
    networks:
      - dst_cluster
    ports:
      - "10999:10999/udp"
    volumes:
      - ./DSTClusterConfig:/home/dst/.klei/DoNotStarveTogether/DSTWhalesCluster
    environment:
      - SHARD_NAME=Master
    stdin_open: true
    tty: true

networks:
  dst_cluster: